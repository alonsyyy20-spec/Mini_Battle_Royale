<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Mini Battle Royale</title>
<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>
<style>
html, body {
  margin:0; padding:0; width:100%; height:100%; overflow:hidden; background:#87ceeb; font-family:Arial; touch-action:none;
}
canvas {
  position:fixed; top:0; left:0; width:100%; height:100%;
}
#ui {
  position:absolute; top:10px; right:10px; color:#00ff00; z-index:20; font-size:22px; font-weight:bold;
}
#gameover {
  position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
  color:red; font-size:50px; z-index:50; display:none; text-shadow: 2px 2px black;
}
#controls {position:absolute; bottom:30px; left:30px; z-index:20;}
#actions {position:absolute; bottom:30px; right:30px; z-index:20;}
button {
  width:110px; height:110px; margin:8px; border:none; border-radius:18px;
  background:rgba(255,255,255,0.35); color:white; font-size:26px; font-weight:bold;
}
.row {display:flex; justify-content:center;}
#minimap {
  position:absolute; top:10px; left:10px; width:200px; height:200px;
  background:rgba(0,0,0,0.7); border:3px solid white; z-index:30;
}
</style>
</head>
<body>

<div id="ui">
  <div id="hp">HP:100</div>
  <div id="storm">Storm:200</div>
  <div id="players">Enemies:0</div>
</div>

<div id="gameover">HAI PERSO!</div>

<div id="controls">
  <div class="row"><button id="up">⬆</button></div>
  <div class="row">
    <button id="left">⬅</button>
    <button id="down">⬇</button>
    <button id="right">➡</button>
  </div>
</div>

<div id="actions">
  <button id="jump">JUMP</button>
  <button id="shoot">FIRE</button>
  <button id="build">WALL</button>
</div>

<canvas id="minimap"></canvas>

<script>
// ====================== THREE.JS SETUP ======================
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb); // cielo azzurro

const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(window.innerWidth,window.innerHeight);
document.body.appendChild(renderer.domElement);

// luce
scene.add(new THREE.AmbientLight(0xffffff,0.8));
const sun = new THREE.DirectionalLight(0xffffff,1);
sun.position.set(50,100,50);
scene.add(sun);

// ====================== TERRENO ======================
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(500,500),
  new THREE.MeshLambertMaterial({color:0x3cb043}) // verde più naturale
);
ground.rotation.x=-Math.PI/2;
scene.add(ground);

// ====================== PLAYER ======================
const player = new THREE.Mesh(
  new THREE.BoxGeometry(2,4,2),
  new THREE.MeshLambertMaterial({color:0x1e90ff}) // blu più brillante
);
player.position.y=2;
scene.add(player);
let playerBox = new THREE.Box3().setFromObject(player);

// ====================== CONTROLLI ======================
const move={up:false,down:false,left:false,right:false};
function bind(id,dir){
  const b=document.getElementById(id);
  b.addEventListener("pointerdown",()=>move[dir]=true);
  b.addEventListener("pointerup",()=>move[dir]=false);
  b.addEventListener("pointerleave",()=>move[dir]=false);
}
bind("up","up"); bind("down","down"); bind("left","left"); bind("right","right");

let velocityY=0; let onGround=true;
document.getElementById("jump").onclick=()=>{ if(onGround){velocityY=0.25; onGround=false;} };

// ====================== BULLETS ======================
const bullets=[];
document.getElementById("shoot").onclick=()=>{
  const bullet = new THREE.Mesh(new THREE.SphereGeometry(0.3), new THREE.MeshBasicMaterial({color:0xffff00}));
  bullet.position.copy(player.position);
  bullet.velocity = new THREE.Vector3(0,0,-1);
  bullets.push(bullet);
  scene.add(bullet);
}

// ====================== MURI ======================
const walls=[];
document.getElementById("build").onclick=()=>{
  const wall = new THREE.Mesh(new THREE.BoxGeometry(5,5,1), new THREE.MeshLambertMaterial({color:0x8b4513})); // marrone più naturale
  wall.position.set(player.position.x,2,player.position.z-5);
  walls.push(wall);
  scene.add(wall);
}

// ====================== BOT ======================
const bots=[];
function spawnBot(){
  const bot = new THREE.Mesh(new THREE.BoxGeometry(2,4,2), new THREE.MeshLambertMaterial({color:0xff4500})); // rosso arancio più visibile
  bot.position.set(Math.random()*100-50,2,Math.random()*100-50);
  bot.hp=3;
  bots.push(bot);
  scene.add(bot);
}
for(let i=0;i<10;i++) spawnBot();

// ====================== MINI MAP ======================
const mini=document.getElementById("minimap");
const ctx=mini.getContext("2d");
mini.width=200; mini.height=200;

function drawMinimap(){
  ctx.clearRect(0,0,200,200);
  const scale=0.3;
  // player
  ctx.fillStyle="blue";
  ctx.beginPath();
  ctx.arc(100 + player.position.x*scale, 100 + player.position.z*scale, 5, 0, Math.PI*2);
  ctx.fill();
  // bots
  ctx.fillStyle="red";
  bots.forEach(bot=>{
    ctx.beginPath();
    ctx.arc(100 + bot.position.x*scale, 100 + bot.position.z*scale, 4, 0, Math.PI*2);
    ctx.fill();
  });
  // muri
  ctx.fillStyle="brown";
  walls.forEach(wall=>{
    ctx.fillRect(100 + (wall.position.x-2.5)*scale, 100 + (wall.position.z-0.5)*scale, 5*scale, 5*scale);
  });
}

// ====================== STATS ======================
let playerHP=100;
let stormRadius=200;
let gameOver=false;

// ====================== LOOP ======================
let lastPos = player.position.clone();
function animate(){
  requestAnimationFrame(animate);
  if(gameOver) return;

  lastPos.copy(player.position);

  // movimento
  if(move.up) player.position.z -=0.4;
  if(move.down) player.position.z +=0.4;
  if(move.left) player.position.x -=0.4;
  if(move.right) player.position.x +=0.4;

  velocityY -=0.01;
  player.position.y+=velocityY;
  if(player.position.y<=2){player.position.y=2; velocityY=0; onGround=true;}

  playerBox.setFromObject(player);

  // collisioni con muri
  walls.forEach(wall=>{
    const wallBox = new THREE.Box3().setFromObject(wall);
    if(playerBox.intersectsBox(wallBox)){player.position.copy(lastPos); playerBox.setFromObject(player);}
  });

  // bullets
  bullets.forEach((b,bi)=>{
    b.position.add(b.velocity);
    bots.forEach((bot,i)=>{
      if(b.position.distanceTo(bot.position)<2){
        bot.hp--;
        scene.remove(b); bullets.splice(bi,1);
        if(bot.hp<=0){scene.remove(bot); bots.splice(i,1);}
      }
    })
  });

  // bot AI e collisioni muri
  bots.forEach(bot=>{
    let botLast = bot.position.clone();
    const dir=new THREE.Vector3().subVectors(player.position,bot.position).normalize();
    bot.position.add(dir.multiplyScalar(0.03));
    let botBox = new THREE.Box3().setFromObject(bot);
    walls.forEach(wall=>{
      const wallBox = new THREE.Box3().setFromObject(wall);
      if(botBox.intersectsBox(wallBox)){bot.position.copy(botLast);}
    });
    // danno se vicino al player
    if(bot.position.distanceTo(player.position)<3){playerHP-=0.2;}
  });

  // respawn bot infiniti
  if(bots.length<10) spawnBot();

  drawMinimap();

  camera.position.x = player.position.x;
  camera.position.z = player.position.z + 12;
  camera.position.y = player.position.y + 7;
  camera.lookAt(player.position);

  document.getElementById("hp").innerText="HP:"+Math.floor(playerHP);
  document.getElementById("players").innerText="Enemies:"+bots.length;

  // GAME OVER
  if(playerHP<=0 && !gameOver){
    gameOver=true;
    document.getElementById("gameover").style.display="block";
  }

  renderer.render(scene,camera);
}
animate();

// ====================== RESIZE ======================
window.addEventListener("resize",()=>{
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth,window.innerHeight);
});
</script>
</body>
</html>
